<!DOCTYPE html>
<html>
<head>
<title>Week Day Predictor AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🤖 Week Day Predictor AI</h1>

<p>Enter today's day:</p>

<input id="day" placeholder="Example: Monday">

<br><br>

<button onclick="predict()">Predict Tomorrow</button>

<br><br>

<p id="status"></p>

<br><br>

<button onclick="window.location.href='games.html'">🏠 Back</button>

<script>

function predict(){

let day=document.getElementById("day").value.toLowerCase();

let next={
"sunday":"Monday",
"monday":"Tuesday",
"tuesday":"Wednesday",
"wednesday":"Thursday",
"thursday":"Friday",
"friday":"Saturday",
"saturday":"Sunday"
};

let status=document.getElementById("status");

status.innerHTML="🚀 Connecting to NASA...";

setTimeout(()=>{
status.innerHTML="🔓 Cracking Pentagon Servers...";
},2000);

setTimeout(()=>{
status.innerHTML="📡 Contacting Aliens...";
},4000);

setTimeout(()=>{
status.innerHTML="🧠 Calculating Quantum Physics...";
},6000);

setTimeout(()=>{

if(next[day]){
status.innerHTML=
"✅ Prediction Complete!<br><br>Tomorrow is <h2>"+next[day]+"</h2><br>Accuracy: 99999999999%";
}else{
status.innerHTML="❌ AI crashed.<br>Type a real weekday 😂";
}

},8000);

}

</script>

</body>
</html>
