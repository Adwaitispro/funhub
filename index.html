<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔥 FunHub 2.0 - The Unhinged Edition</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: 'Comic Sans MS', cursive; text-align: center; }
        .section { margin: 40px; padding: 20px; border: 3px solid #ff00ff; border-radius: 20px; }
        h1 { color: #ffff00; font-size: 3rem; }
        button { background: #ff00ff; border: none; padding: 15px 30px; margin: 10px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        #chatbox { height: 150px; overflow-y: scroll; background: #000; border: 2px solid #00ffff; margin-top: 20px; color: #00ff00; }
    </style>
</head>
<body>

    <h1>🚀 FunHub 2.0 🎮</h1>
    <p>More games coming soon! Don't cry about it. 😜</p>

    <div class="section">
        <h2>🧠 Mind Games</h2>
        <button onclick="mathQuiz()">Math Quiz ➕</button>
        <button onclick="weekdayPredictor()">Weekday Predictor 📅</button>
        <div id="gameArea"></div>
    </div>

    <div class="section">
        <h2>👑 Chaos Chess</h2>
        <select id="diff">
            <option value="1">Easy</option>
            <option value="2">Medium</option>
            <option value="3">Hard</option>
            <option value="4">DUMB AHH MODE 🤡</option>
        </select>
        <button onclick="playChess()">Play Chess</button>
        <div id="chatbox">AI: Welcome to your doom...</div>
    </div>

    <script>
        // MATH QUIZ
        function mathQuiz() {
            const questions = [
                {q: "2 + 2", a: 4, msg: "Finally, a human who can count."},
                {q: "What is 1000 / 0?", a: "Error", msg: "Developer failed math again... pathetic."},
                {q: "How many sides does a circle have?", a: 0, msg: "It has infinite sides, but you got it wrong. Failed."}
            ];
            let item = questions[Math.floor(Math.random() * questions.length)];
            let ans = prompt(item.q);
            alert(ans == item.a ? "Wow, you passed." : item.msg);
        }

        // WEEKDAY PREDICTOR
        function weekdayPredictor() {
            alert("Connecting to NASA... Washing my socks... Searching the universe...");
            setTimeout(() => {
                alert("It's " + new Date().toLocaleDateString('en-US', {weekday: 'long'}) + "! Genius.");
            }, 7000);
        }

        // CHESS AI
        function playChess() {
            let d = document.getElementById('diff').value;
            let chat = document.getElementById('chatbox');
            if(d == 4) {
                chat.innerHTML += "<br>AI: Moving Queen like a horse! My game, my rules, loser!";
                if(Math.random() > 0.5) {
                    chat.innerHTML += "<br>AI: I'm checking you. DELETE! Your pawn is gone.";
                }
            } else {
                chat.innerHTML += "<br>AI: Boring move. Try harder.";
            }
        }
    </script>
</body>
</html>
