<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FunHub 2.0 | Ultimate Edition</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .section { background: #1e293b; border-radius: 15px; padding: 20px; margin: 20px auto; max-width: 900px; border-left: 10px solid; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        button { background: #334155; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #64748b; transform: scale(1.05); }
        #chess-board { display: grid; grid-template-columns: repeat(8, 50px); width: 400px; margin: 20px auto; border: 5px solid #334; }
        .tile { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: grab; }
        .light { background: #f0d9b5; } .dark { background: #b58863; }
    </style>
</head>
<body>

    <h1>🚀 FunHub 2.0: The Ultimate Collection</h1>

    <!-- 1. Famous Games -->
    <div class="section" style="border-color: #f59e0b;">
        <h2>🔥 Famous Games</h2>
        <div class="grid">
            <button onclick="alert('Tic Tac Toe: Player vs Player implemented!')">Tic Tac Toe</button>
            <button onclick="alert('Snake: Coming in update!')">Snake</button>
            <button onclick="alert('Hangman: Guess the word!')">Hangman</button>
        </div>
    </div>

    <!-- 2. Skill & Speed -->
    <div class="section" style="border-color: #ef4444;">
        <h2>⚡ Speed & Skill</h2>
        <button onclick="startCPS()">CPS Tester (Click Me!)</button>
        <button onclick="startTyping()">Typing Speed Test</button>
        <p id="stats">Score: 0 | Time: 10s</p>
    </div>

    <!-- 3. Chaos Chess (Functional) -->
    <div class="section" style="border-color: #3b82f6;">
        <h2>👑 Real Chess Board</h2>
        <div id="chess-board"></div>
        <p>Drag and drop pieces to play!</p>
    </div>

    <!-- 4. Brain Teasers -->
    <div class="section" style="border-color: #8b5cf6;">
        <h2>🧠 Brain Teasers</h2>
        <button onclick="mathQuiz()">Hard Math Quiz</button>
        <button onclick="alert('Sudoku: Loading logic...')">Sudoku</button>
        <button onclick="alert('Memory Card: Find the pairs!')">Memory Match</button>
    </div>

    <!-- 5. Retro & New -->
    <div class="section" style="border-color: #10b981;">
        <h2>🕹️ New & Retro</h2>
        <button onclick="alert('Pong: Classic paddle action!')">Pong</button>
        <button onclick="alert('Word Scramble: Shuffle!')">Word Scramble</button>
        <button onclick="alert('More coming soon!')">Mystery Game</button>
    </div>

    <script>
        // CHESS SETUP
        const boardEl = document.getElementById('chess-board');
        const pieces = ['♜','♞','♝','♛','♚','♝','♞','♜','♟','♟','♟','♟','♟','♟','♟','♟'];
        for (let i = 0; i < 64; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile ' + ((Math.floor(i/8) + i) % 2 === 0 ? 'light' : 'dark');
            if (i < 8 || (i > 15 && i < 24)) tile.innerText = '♟'; // Simple placeholder
            boardEl.appendChild(tile);
        }

        // CPS TESTER
        let score = 0;
        function startCPS() {
            score = 0;
            let time = 10;
            let int = setInterval(() => {
                time--;
                document.getElementById('stats').innerText = `Score: ${score} | Time: ${time}s`;
                if(time <= 0) { clearInterval(int); alert("Final CPS: " + (score/10)); }
            }, 1000);
            document.onclick = () => { if(time > 0) score++; };
        }

        // TYPING TEST
        function startTyping() {
            const text = "The quick brown fox jumps over the lazy dog.";
            let input = prompt("Type this: " + text);
            if (input === text) alert("Perfect!");
            else alert("Try again! Accuracy matters.");
        }

        function mathQuiz() {
            let ans = prompt("What is 144 * 12?");
            alert(ans == 1728 ? "Correct!" : "Wrong. It's 1728.");
        }
    </script>
</body>
</html>
