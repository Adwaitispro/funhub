<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test ⌨️ — FunHub</title>
<link rel="stylesheet" href="../../styles.css">
</head>
<body>

<div class="topbar">
  <div class="logo">FUN<span>HUB</span></div>
  <a class="back" href="../../index.html">← All games</a>
</div>

<div class="game-wrap">
  <h1>⌨️ Typing Speed Test</h1>
  <p class="sub">Type the paragraph below as fast and accurately as you can. Timer starts on your first keystroke.</p>

  <div class="panel">
    <p id="promptText" style="font-size:1.15rem; line-height:1.8; color:var(--muted); user-select:none;"></p>
    <textarea id="typeArea" rows="4" style="width:100%; font-family:var(--font-body); font-size:1.05rem; padding:12px; border-radius:10px; border:2px solid rgba(255,255,255,0.1); background:var(--ink-3); color:var(--white);" placeholder="Start typing here..."></textarea>
    <div style="display:flex; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:10px;">
      <span class="mono" id="liveStats" style="color:var(--yellow);">0 WPM · 100% accuracy</span>
      <button class="btn btn-purple" id="newPara">New paragraph</button>
    </div>

    <div id="resultBox" style="display:none; text-align:center; margin-top:20px;">
      <h2 id="wpmResult" class="display" style="color:var(--yellow); font-size:2.4rem; margin:6px 0;"></h2>
      <p id="accResult" style="font-size:1.1rem; margin:0 0 16px; color:var(--muted);"></p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <input type="text" id="nameInput" placeholder="Your name" maxlength="20">
        <button class="btn btn-mint" id="submitBtn">Submit to leaderboard</button>
        <button class="btn btn-purple" id="retryBtn">Try again</button>
      </div>
      <p id="submitStatus" class="mono" style="color:var(--muted); margin-top:8px;"></p>
    </div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0;">🏆 Leaderboard (WPM)</h3>
    <div class="leaderboard" id="leaderboard"></div>
  </div>
</div>

<footer>chatgpt writes the paragraphs. we take no responsibility for their content.</footer>

<script src="../../config.js"></script>
<script src="../../js/leaderboard.js"></script>
<script src="typing.js"></script>
</body>
</html>
