<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS Test 🖱️ — FunHub</title>
<link rel="stylesheet" href="../../styles.css">
</head>
<body>

<div class="topbar">
  <div class="logo">FUN<span>HUB</span></div>
  <a class="back" href="../../index.html">← All games</a>
</div>

<div class="game-wrap">
  <h1>🖱️ CPS Test</h1>
  <p class="sub">Click as many times as you can before time runs out. We'll compare you to an animal. This is not optional.</p>

  <div class="panel">
    <div style="display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; align-items:center;">
      <span class="mono" style="color:var(--muted)">Duration:</span>
      <button class="btn btn-purple" id="dur5">5 sec</button>
      <button class="btn btn-purple" id="dur10">10 sec</button>
      <span class="mono" id="durLabel" style="margin-left:auto; color:var(--yellow);">Selected: 5s</span>
    </div>

    <button id="clickBox" class="btn btn-pink" style="width:100%; height:220px; font-size:1.8rem; border-radius:22px;">
      Click here to start!
    </button>

    <div id="resultBox" style="display:none; text-align:center; margin-top:20px;">
      <h2 id="cpsResult" class="display" style="color:var(--yellow); font-size:2.4rem; margin:6px 0;"></h2>
      <p id="animalResult" style="font-size:1.3rem; margin:0 0 16px;"></p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <input type="text" id="nameInput" placeholder="Your name" maxlength="20">
        <button class="btn btn-mint" id="submitBtn">Submit to leaderboard</button>
        <button class="btn btn-purple" id="retryBtn">Try again</button>
      </div>
      <p id="submitStatus" class="mono" style="color:var(--muted); margin-top:8px;"></p>
    </div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0;">🏆 Leaderboard</h3>
    <div class="leaderboard" id="leaderboard"></div>
  </div>
</div>

<footer>fastest clickers get bragging rights. slowest get sympathy.</footer>

<script src="../../config.js"></script>
<script src="../../js/leaderboard.js"></script>
<script src="cps.js"></script>
</body>
</html>
